<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OvaDrugX - Create New Password</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 10% 20%, rgba(25, 118, 210, 0.05) 0%, rgba(0, 188, 212, 0.05) 90%);
        }
        
        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
        }
        
        .logo-container {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            margin: 0 auto 32px;
        }
        
        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #E0E0E0;
            background-color: #F9FAFB;
        }
        
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(25, 118, 210, 0.1);
            border-color: var(--primary-blue);
        }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/img/launch.ico">
</head>
<body>

    <div class="premium-card auth-card">
        <div class="logo-container">
            <img src="assets/img/launch.png" alt="OvaDrugX" height="50">
        </div>
        
        <div class="text-center mb-4">
            <h3 class="fw-bold">New Password</h3>
            <p class="text-secondary small">Set a strong password for your account.</p>
        </div>
        
        <form id="resetForm">
            <div class="mb-3">
                <label class="form-label fw-semibold small">New Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-semibold small">Confirm Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-premium w-100 py-3 fs-6 mb-4">Reset Password</button>
        </form>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = e.target.querySelectorAll('input[type="password"]')[0].value;
            const confirmPassword = e.target.querySelectorAll('input[type="password"]')[1].value;
            const email = localStorage.getItem('reset_email');

            if (!email) {
                window.location.href = 'forgot-password.html';
                return;
            }

            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Resetting...';

            const result = await auth.resetPassword(email, password);

            if (result.success) {
                alert('Password reset successfully! Please sign in.');
                window.location.href = 'signin.html';
            } else {
                alert(result.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Reset Password';
            }
        });
    </script>

</body>
</html>
