<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OvaDrugX - Insights & Analytics</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .insight-card {
            border: none;
            background: white;
            border-radius: var(--card-radius);
            padding: 24px;
        }
        
        .chart-placeholder {
            height: 200px;
            background-color: #F9FAFB;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 14px;
            border: 1px dashed #E0E0E0;
        }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/img/launch.ico">
</head>
<body class="bg-light">

    <!-- Desktop Navbar -->
    <nav class="navbar-web">
        <a href="home.html" class="navbar-brand">
            <img src="assets/img/launch.png" alt="OvaDrugX" height="40">
            <span>OvaDrugX</span>
        </a>
        
        <div class="desktop-nav">
            <a href="home.html">Home</a>
            <a href="screening.html">Screening</a>
            <a href="targets.html">Targets</a>
            <a href="insights.html" class="active">Insights</a>
            <a href="profile.html">Profile</a>
        </div>
        
        <div class="d-flex align-items-center gap-3">
            <div class="stat-chip d-none d-md-flex" style="border-radius: 50%; width: 40px; height: 40px; justify-content: center; padding: 0;">
                <i class="far fa-bell text-dark"></i>
            </div>
            <a href="profile.html">
                <img src="assets/img/profile.png" alt="Profile" width="40" height="40" class="rounded-circle shadow-sm border border-2 border-white">
            </a>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="mb-4">
            <p class="text-secondary">Comprehensive analytics and visualization of your drug discovery research data.</p>
        </div>

        <!-- Summary Stats Grid -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="premium-card p-3 text-center">
                    <i class="fas fa-microscope text-primary mb-2"></i>
                    <span class="d-block small text-secondary">Screenings</span>
                    <span class="h5 fw-bold">156</span>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="premium-card p-3 text-center">
                    <i class="fas fa-bullseye text-success mb-2"></i>
                    <span class="d-block small text-secondary">Targets</span>
                    <span class="h5 fw-bold">892</span>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="premium-card p-3 text-center">
                    <i class="fas fa-chart-line text-warning mb-2"></i>
                    <span class="d-block small text-secondary">Avg. Acc.</span>
                    <span class="h5 fw-bold">94%</span>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="premium-card p-3 text-center">
                    <i class="fas fa-file-pdf text-danger mb-2"></i>
                    <span class="d-block small text-secondary">Reports</span>
                    <span class="h5 fw-bold">34</span>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="row g-4 mb-5">
            <div class="col-12">
                <div class="premium-card p-4">
                    <h6 class="fw-bold mb-3">Screening Activity Trend</h6>
                    <div class="chart-placeholder">
                        <canvas id="activityChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-12">
                <div class="premium-card p-4">
                    <h6 class="fw-bold mb-3">Target Distribution</h6>
                    <div class="chart-placeholder">
                        <canvas id="targetDistributionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="screening.html" class="nav-item">
            <i class="fas fa-search"></i>
            <span>Screening</span>
        </a>
        <a href="targets.html" class="nav-item">
            <i class="fas fa-bullseye"></i>
            <span>Targets</span>
        </a>
        <a href="insights.html" class="nav-item active">
            <i class="fas fa-chart-pie"></i>
            <span>Insights</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // activityChart
            const actCtx = document.getElementById('activityChart').getContext('2d');
            new Chart(actCtx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Active Screenings',
                        data: [12, 19, 15, 24, 20, 30],
                        borderColor: '#1976D2',
                        backgroundColor: 'rgba(25, 118, 210, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false } } }
                }
            });

            // targetDistributionChart
            const distCtx = document.getElementById('targetDistributionChart').getContext('2d');
            new Chart(distCtx, {
                type: 'doughnut',
                data: {
                    labels: ['BRCA1', 'TP53', 'Others'],
                    datasets: [{
                        data: [45, 35, 20],
                        backgroundColor: ['#1976D2', '#00BCD4', '#E0E0E0'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        });
    </script>
</body>
</html>
