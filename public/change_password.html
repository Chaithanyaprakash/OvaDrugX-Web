<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OvaDrugX - Change Password</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            margin: 40px auto;
        }
        
        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #E0E0E0;
            background-color: #F9FAFB;
        }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/img/launch.ico">
</head>
<body class="bg-light">

    <!-- Desktop Navbar -->
    <nav class="navbar-web">
        <a href="home.html" class="navbar-brand">
            <img src="assets/img/launch.png" alt="OvaDrugX" height="40">
            <span>OvaDrugX</span>
        </a>
        
        <div class="desktop-nav">
            <a href="home.html">Home</a>
            <a href="screening.html">Screening</a>
            <a href="targets.html">Targets</a>
            <a href="insights.html">Insights</a>
            <a href="profile.html" class="active">Profile</a>
        </div>
        
        <div class="d-flex align-items-center gap-3">
            <div class="stat-chip d-none d-md-flex" style="border-radius: 50%; width: 40px; height: 40px; justify-content: center; padding: 0;">
                <i class="far fa-bell text-dark"></i>
            </div>
            <a href="profile.html">
                <img src="assets/img/profile.png" alt="Profile" width="40" height="40" class="rounded-circle shadow-sm border border-2 border-white">
            </a>
        </div>
    </nav>

    <div class="container container-content mt-5">
        <div class="premium-card auth-card">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="profile.html" class="btn btn-light rounded-circle p-2" style="width: 40px; height: 40px;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h3 class="fw-bold mb-0">Change Password</h3>
            </div>
            
            <form id="changePasswordForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Current Password</label>
                    <input type="password" id="currentPassword" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold small">New Password</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-semibold small">Confirm New Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-premium w-100 py-3 fs-6">Update Password</button>
            </form>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="screening.html" class="nav-item">
            <i class="fas fa-search"></i>
            <span>Screening</span>
        </a>
        <a href="targets.html" class="nav-item">
            <i class="fas fa-bullseye"></i>
            <span>Targets</span>
        </a>
        <a href="insights.html" class="nav-item">
            <i class="fas fa-chart-pie"></i>
            <span>Insights</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const currentPass = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (newPass !== confirmPass) {
                alert('New passwords do not match');
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Updating...';

            const user = auth.checkAuth();
            if (!user) {
                alert('Session expired. Please sign in again.');
                window.location.href = 'signin.html';
                return;
            }

            // In a real app, this would be auth.changePassword(user.email, currentPass, newPass)
            // For now, we simulate success with a delay
            setTimeout(() => {
                alert('Password updated successfully!');
                window.location.href = 'profile.html';
            }, 1500);
        });
    </script>

</body>
</html>
