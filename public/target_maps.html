<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OvaDrugX - Target Maps</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .map-container {
            height: 600px;
            background: #f0f4f8;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #E0E0E0;
        }
        
        .target-node {
            position: absolute;
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s;
            border: 4px solid var(--primary-blue);
        }
        
        .target-node:hover {
            transform: scale(1.1);
            z-index: 10;
        }
        
        .connection-line {
            position: absolute;
            height: 2px;
            background: var(--primary-blue);
            opacity: 0.2;
            transform-origin: left center;
        }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/img/launch.ico">
</head>
<body class="bg-light">

    <!-- Desktop Navbar -->
    <nav class="navbar-web">
        <a href="home.html" class="navbar-brand">
            <img src="assets/img/launch.png" alt="OvaDrugX" height="40">
            <span>OvaDrugX</span>
        </a>
        
        <div class="desktop-nav">
            <a href="home.html">Home</a>
            <a href="screening.html">Screening</a>
            <a href="targets.html">Targets</a>
            <a href="insights.html">Insights</a>
            <a href="profile.html">Profile</a>
        </div>
        
        <div class="d-flex align-items-center gap-3">
            <div class="stat-chip d-none d-md-flex" style="border-radius: 50%; width: 40px; height: 40px; justify-content: center; padding: 0;">
                <i class="far fa-bell text-dark"></i>
            </div>
            <a href="profile.html">
                <img src="assets/img/profile.png" alt="Profile" width="40" height="40" class="rounded-circle shadow-sm border border-2 border-white">
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="mb-4 d-flex justify-content-between align-items-center">
            <div>
                <h1 class="h3 fw-bold mb-0">Target Interaction Maps</h1>
                <p class="text-secondary">Mapping relationships between identify molecular targets and signaling pathways.</p>
            </div>
            <button class="btn btn-premium btn-pill">
                <i class="fas fa-project-diagram me-2"></i> Rearrange
            </button>
        </div>

        <div class="premium-card p-4 mb-5">
            <div class="map-container">
                <!-- Mock Map Nodes -->
                <div class="target-node" style="top: 20%; left: 40%;">
                    <h6 class="mb-0 fw-bold">BRCA1</h6>
                    <span class="small text-primary fw-bold">Active</span>
                </div>
                
                <div class="target-node" style="top: 50%; left: 20%; border-color: var(--neon-cyan);">
                    <h6 class="mb-0 fw-bold">PARP1</h6>
                    <span class="small text-info fw-bold">High Affinity</span>
                </div>

                <div class="target-node" style="top: 60%; left: 65%; border-color: var(--warning-orange);">
                    <h6 class="mb-0 fw-bold">TP53</h6>
                    <span class="small text-warning fw-bold">Mutated</span>
                </div>

                <!-- Labels -->
                <div class="position-absolute bottom-0 start-0 p-4">
                    <div class="d-flex align-items-center gap-3 bg-white p-3 rounded-4 shadow-sm">
                        <div class="d-flex align-items-center gap-2">
                            <span class="badge rounded-circle p-1 bg-primary">&nbsp;</span>
                            <span class="small fw-bold">Potent</span>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <span class="badge rounded-circle p-1 bg-info">&nbsp;</span>
                            <span class="small fw-bold">High Selectivity</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="screening.html" class="nav-item">
            <i class="fas fa-search"></i>
            <span>Screening</span>
        </a>
        <a href="targets.html" class="nav-item">
            <i class="fas fa-bullseye"></i>
            <span>Targets</span>
        </a>
        <a href="insights.html" class="nav-item">
            <i class="fas fa-chart-pie"></i>
            <span>Insights</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
