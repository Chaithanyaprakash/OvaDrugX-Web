<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OvaDrugX - Update Profile</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .profile-edit-card {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            margin: 40px auto;
        }
        
        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #E0E0E0;
            background-color: #F9FAFB;
        }

        .avatar-edit {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
        }

        .avatar-edit img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .edit-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary-color);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            cursor: pointer;
        }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/img/launch.ico">
</head>
<body class="bg-light">

    <!-- Desktop Navbar -->
    <nav class="navbar-web">
        <a href="home.html" class="navbar-brand">
            <img src="assets/img/launch.png" alt="OvaDrugX" height="40">
            <span>OvaDrugX</span>
        </a>
        
        <div class="desktop-nav">
            <a href="home.html">Home</a>
            <a href="screening.html">Screening</a>
            <a href="targets.html">Targets</a>
            <a href="insights.html">Insights</a>
            <a href="profile.html" class="active">Profile</a>
        </div>
        
        <div class="d-flex align-items-center gap-3">
            <a href="notifications.html" class="stat-chip d-none d-md-flex" style="border-radius: 50%; width: 40px; height: 40px; justify-content: center; padding: 0;">
                <i class="far fa-bell text-dark"></i>
            </a>
            <a href="profile.html">
                <img src="assets/img/profile.png" alt="Profile" width="40" height="40" class="rounded-circle shadow-sm border border-2 border-white">
            </a>
        </div>
    </nav>

    <div class="container container-content mt-5">
        <div class="premium-card profile-edit-card">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="profile.html" class="btn btn-light rounded-circle p-2" style="width: 40px; height: 40px;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h3 class="fw-bold mb-0">Update Profile</h3>
            </div>

            <div class="avatar-edit">
                <img id="profilePreview" src="assets/img/profile.png" alt="Profile">
                <label for="avatarInput" class="edit-badge">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="avatarInput" hidden accept="image/*">
            </div>
            
            <form id="updateProfileForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Sarah Chen" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold small">Bio</label>
                    <textarea id="bio" class="form-control" rows="3" placeholder="Clinical Researcher at OvaDrugX"></textarea>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-semibold small">Phone Number</label>
                    <input type="tel" id="phoneNumber" class="form-control" placeholder="+1 234 567 890">
                </div>
                
                <button type="submit" class="btn-premium w-100 py-3 fs-6">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="screening.html" class="nav-item">
            <i class="fas fa-search"></i>
            <span>Screening</span>
        </a>
        <a href="targets.html" class="nav-item">
            <i class="fas fa-bullseye"></i>
            <span>Targets</span>
        </a>
        <a href="insights.html" class="nav-item">
            <i class="fas fa-chart-pie"></i>
            <span>Insights</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js?v=1.1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = auth.checkAuth();
            if (!user) return;

            // Load current data from API to get Bio/Department
            try {
                const result = await auth.getAccount(user.email);
                if (result.success) {
                    document.getElementById('fullName').value = result.data.full_name || '';
                    document.getElementById('bio').value = result.data.department || '';
                    document.getElementById('phoneNumber').value = user.mobile || '';
                } else {
                    // Fallback to local storage
                    document.getElementById('fullName').value = user.full_name || '';
                    document.getElementById('phoneNumber').value = user.mobile || '';
                }
            } catch (err) {
                console.error("Error loading profile:", err);
            }

            // Preview avatar
            document.getElementById('avatarInput').addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('profilePreview').src = e.target.result;
                    }
                    reader.readAsDataURL(e.target.files[0]);
                }
            });

            document.getElementById('updateProfileForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const submitBtn = e.target.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Saving...';

                const userData = {
                    email: user.email,
                    full_name: document.getElementById('fullName').value,
                    bio: document.getElementById('bio').value,
                    mobile: document.getElementById('phoneNumber').value
                };

                const response = await auth.updateAccount(userData);
                
                if (response.success) {
                    alert('Profile updated successfully!');
                    window.location.href = 'profile.html';
                } else {
                    alert('Failed to update profile: ' + response.message);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            });
        });
    </script>

</body>
</html>
